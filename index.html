<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yzhel Zapanta | Video Editor Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0b0c10;
            --accent-color: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #a4b3c6;
            --card-bg: #11141a;
            --font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-family); scroll-behavior: smooth; }

        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 60px; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* Animation Classes */
        .reveal-base { opacity: 0; will-change: transform, opacity, filter; transition-duration: 0.85s; transition-timing-function: cubic-bezier(0.25, 1, 0.5, 1); }
        .reveal-fade-blur { filter: blur(10px); transition-property: opacity, filter; }
        .reveal-fade-blur.active-reveal { opacity: 1; filter: blur(0); }
        .reveal-slide-up { transform: translateY(40px); transition-property: opacity, transform; }
        .reveal-slide-up.active-reveal { opacity: 1; transform: translateY(0); }
        .reveal-scale-in { transform: scale(0.95); transition-property: opacity, transform; }
        .reveal-scale-in.active-reveal { opacity: 1; transform: scale(1); }
        .reveal-slide-left { transform: translateX(-50px); transition-property: opacity, transform; }
        .reveal-slide-left.active-reveal { opacity: 1; transform: translateX(0); }
        .reveal-slide-right { transform: translateX(50px); transition-property: opacity, transform; }
        .reveal-slide-right.active-reveal { opacity: 1; transform: translateX(0); }

        .delay-1 { transition-delay: 100ms; }
        .delay-2 { transition-delay: 200ms; }
        .delay-3 { transition-delay: 300ms; }

        nav { display: flex; justify-content: center; gap: 30px; padding: 30px 0; position: sticky; top: 0; background: rgba(11, 12, 16, 0.9); backdrop-filter: blur(10px); z-index: 1000; }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; cursor: pointer; transition: color 0.3s; padding-bottom: 4px; border-bottom: 2px solid transparent; }
        nav a:hover, nav a.active { color: var(--text-main); border-bottom-color: var(--text-main); }

        header { max-width: 1000px; margin: 40px auto 40px auto; text-align: center; padding: 0 24px; }
        h1 { font-size: 4rem; font-weight: 800; margin-bottom: 35px; letter-spacing: -1.5px; }

        .page-section { display: none; }
        .page-section.active-section { display: block; }
        .section-title { text-align: center; font-size: 2.2rem; font-weight: 700; margin: 40px 0 30px 0; }

        .container { max-width: 1440px; margin: 0 auto; padding: 0 40px; }

        /* About & Grid Styles */
        .about-grid { display: flex; align-items: center; gap: 50px; max-width: 950px; margin: 0 auto; background: var(--card-bg); padding: 50px; border-radius: 16px; }
        .portfolio-tabs { display: flex; justify-content: center; gap: 15px; margin-bottom: 45px; }
        .tab-btn { background: transparent; border: 1px solid #23354d; color: var(--text-muted); padding: 12px 30px; font-size: 0.85rem; font-weight: 700; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; }
        .tab-btn.active, .tab-btn:hover { border-color: var(--accent-color); color: var(--text-main); background: rgba(0, 210, 255, 0.05); }
        
        .portfolio-subgrid { display: none; max-width: 1360px; margin: 0 auto; grid-template-columns: repeat(3, 1fr); gap: 35px; }
        .portfolio-subgrid.active-subgrid { display: grid; }
        .shortform-grid { grid-template-columns: repeat(4, 1fr); }

        .video-box { position: relative; width: 100%; background: #000; border-radius: 16px; overflow: hidden; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.04); }
        .longform-box { padding-top: 56.25%; }
        .shortform-box { padding-top: 177.77%; }
        .thumb-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
        .play-overlay-btn { width: 68px; height: 48px; background: rgba(33, 33, 33, 0.9); border-radius: 14px; display: flex; align-items: center; justify-content: center; }

        @media (max-width: 768px) { .longform-grid, .shortform-grid { grid-template-columns: 1fr; } .about-grid { flex-direction: column; } }
    </style>
</head>
<body>

    <nav>
        <a id="nav-home" class="active" onclick="switchPage('home')">Home</a>
        <a id="nav-about" onclick="switchPage('about')">About</a>
        <a id="nav-portfolio" onclick="switchPage('portfolio')">Portfolio</a>
    </nav>

    <header class="reveal-base reveal-fade-blur">
        <h1>Yzhel Zapanta</h1>
    </header>

    <div id="page-home" class="container page-section active-section">
        <h2 class="section-title reveal-base reveal-slide-up">Sample Work</h2>
        <!-- Content here -->
    </div>

    <div id="page-about" class="container page-section">
        <h2 class="section-title reveal-base reveal-slide-up">About Me</h2>
        <div class="about-grid reveal-base reveal-scale-in delay-1">
            <p>Video editing tailored for growing brands.</p>
        </div>
    </div>

    <div id="page-portfolio" class="container page-section">
        <h2 class="section-title reveal-base reveal-slide-up">Portfolio</h2>
        <div class="portfolio-tabs reveal-base reveal-fade-blur delay-1">
            <button id="tab-long" class="tab-btn active" onclick="switchPortfolioTab('longform')">LONGFORM</button>
            <button id="tab-short" class="tab-btn" onclick="switchPortfolioTab('shortform')">SHORTFORM</button>
        </div>
        <div id="subgrid-longform" class="portfolio-subgrid longform-grid active-subgrid">
            <div class="video-box longform-box reveal-base reveal-slide-left"></div>
        </div>
        <div id="subgrid-shortform" class="portfolio-subgrid shortform-grid">
            <div class="video-box shortform-box reveal-base reveal-slide-left"></div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        function resetAllAnimations() {
            document.querySelectorAll('.reveal-base').forEach(el => el.classList.remove('active-reveal'));
        }

        function triggerTargetSectionAnimations(containerId) {
            const container = document.getElementById(containerId);
            if (!container) return;
            const animationElements = container.querySelectorAll('.reveal-base');
            animationElements.forEach(el => {
                void el.offsetWidth; // Force reflow
                el.classList.add('active-reveal');
            });
        }

        function switchPage(pageTarget) {
            resetAllAnimations();
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active-section'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            
            const target = document.getElementById('page-' + pageTarget);
            target.classList.add('active-section');
            document.getElementById('nav-' + pageTarget).classList.add('active');
            
            setTimeout(() => triggerTargetSectionAnimations('page-' + pageTarget), 50);
        }

        function switchPortfolioTab(type) {
            resetAllAnimations();
            document.querySelectorAll('.portfolio-subgrid').forEach(g => g.classList.remove('active-subgrid'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            const gridId = type === 'longform' ? 'subgrid-longform' : 'subgrid-shortform';
            document.getElementById(gridId).classList.add('active-subgrid');
            document.getElementById('tab-' + (type === 'longform' ? 'long' : 'short')).classList.add('active');
            
            setTimeout(() => triggerTargetSectionAnimations(gridId), 50);
        }

        document.addEventListener("DOMContentLoaded", () => {
            triggerTargetSectionAnimations('page-home');
        });
    </script>
</body>
</html>
