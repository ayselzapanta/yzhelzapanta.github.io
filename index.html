<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yzhel Zapanta | Portfolio</title>
    
    <style>
        :root { --bg-color: #0b0c10; --text-main: #ffffff; --accent-color: #00d2ff; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: sans-serif; overflow-x: hidden; }

        /* Animation System */
        .reveal-base { opacity: 0; transition: all 0.8s ease; }
        .reveal-slide-up { transform: translateY(30px); }
        .reveal-scale-in { transform: scale(0.95); }
        .active-reveal { opacity: 1 !important; transform: translate(0) scale(1) !important; filter: blur(0) !important; }

        /* Page Layout */
        .page-section { display: none; padding: 50px 20px; }
        .page-section.active-section { display: block; }
        
        nav { display: flex; justify-content: center; gap: 20px; padding: 20px; background: #111; }
        nav a { color: white; cursor: pointer; text-decoration: none; padding: 10px; }
        nav a.active { border-bottom: 2px solid var(--accent-color); }

        .portfolio-subgrid { display: none; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .portfolio-subgrid.active-subgrid { display: grid; }
        
        .box { background: #1a1a1a; height: 200px; border-radius: 10px; }
    </style>
</head>
<body>

    <nav>
        <a id="nav-home" class="active" onclick="switchPage('home')">Home</a>
        <a id="nav-about" onclick="switchPage('about')">About</a>
        <a id="nav-portfolio" onclick="switchPage('portfolio')">Portfolio</a>
    </nav>

    <div id="page-home" class="page-section active-section">
        <h1 class="reveal-base reveal-slide-up">Home Page</h1>
        <div class="box reveal-base reveal-scale-in"></div>
    </div>

    <div id="page-about" class="page-section">
        <h1 class="reveal-base reveal-slide-up">About Me</h1>
        <p class="reveal-base reveal-slide-up">This is the about section.</p>
    </div>

    <div id="page-portfolio" class="page-section">
        <h1 class="reveal-base reveal-slide-up">Portfolio</h1>
        <button onclick="switchPortfolioTab('longform')">LONGFORM</button>
        <button onclick="switchPortfolioTab('shortform')">SHORTFORM</button>

        <div id="subgrid-longform" class="portfolio-subgrid active-subgrid">
            <div class="box reveal-base reveal-scale-in"></div>
        </div>
        <div id="subgrid-shortform" class="portfolio-subgrid">
            <div class="box reveal-base reveal-scale-in"></div>
        </div>
    </div>

    <script>
        function triggerAnimations(containerId) {
            const container = document.getElementById(containerId);
            const elements = container.querySelectorAll('.reveal-base');
            elements.forEach(el => {
                el.classList.remove('active-reveal'); // Ensure clean slate
                void el.offsetWidth; // Trigger reflow
                el.classList.add('active-reveal');
            });
        }

        function switchPage(targetId) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active-section'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            
            const target = document.getElementById('page-' + targetId);
            target.classList.add('active-section');
            document.getElementById('nav-' + targetId).classList.add('active');
            
            triggerAnimations('page-' + targetId);
        }

        function switchPortfolioTab(type) {
            document.querySelectorAll('.portfolio-subgrid').forEach(g => g.classList.remove('active-subgrid'));
            const targetGrid = document.getElementById('subgrid-' + type);
            targetGrid.classList.add('active-subgrid');
            
            triggerAnimations('subgrid-' + type);
        }

        // Initialize on load
        triggerAnimations('page-home');
    </script>
</body>
</html>
