    <!-- FontAwesome for clean social media icons -->

    <style>
        :root {
            --bg-color: #0b0c10;
            --accent-color: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #a4b3c6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 60px;
        }

        /* Top Navigation Menu to match reference */
        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 30px 0;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            transition: color 0.3s;
        }

        nav a:hover, nav a.active {
            color: var(--text-main);
            border-bottom: 2px solid var(--text-main);
            padding-bottom: 4px;
        }

        /* Hero Header Structure from Main Page.jpg */
        header {
            max-width: 1000px;
            margin: 40px auto 60px auto;
            text-align: center;
            padding: 0 24px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 35px;
            letter-spacing: -1px;
        }

        /* Subtitle layout with horizontal rule lines */
        .sub-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto 35px auto;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .sub-bar .line {
            flex-grow: 1;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.15);
        }

        .sub-item {
            font-weight: 500;
            white-space: nowrap;
        }

        /* Social Icons Grid Setup */
        .socials-row {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
        }

        .socials-row a {
            color: var(--text-muted);
            font-size: 1.2rem;
            transition: color 0.3s, transform 0.3s;
        }

        .socials-row a:hover {
            color: var(--accent-color);
            transform: translateY(-3px);
        }

        /* Section Headings */
        .section-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 700;
            margin: 80px 0 40px 0;
            letter-spacing: -0.5px;
        }

        /* Responsive Grids tailored per section style */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 30px;
        }

        .longform-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .shortform-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        /* Media Frame wrappers to hold standard & vertical native specs */
        .video-box {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .video-box:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        .longform-box {
            padding-top: 56.25%; /* Fixed 16:9 */
        }

        .shortform-box {
            padding-top: 177.77%; /* True 9:16 Vertical aspect lock */
        }

        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Footer Layout elements based on the bottom layout design */
        footer {
            margin-top: 120px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 60px 24px;
            text-align: center;
        }

        .footer-logo {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .footer-nav {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 25px;
        }

        .footer-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
        }

        .copyright {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            margin-top: 30px;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.8rem; }
            .sub-bar { flex-direction: column; gap: 8px; }
            .sub-bar .line { display: none; }
            .longform-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
