<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yzhel Zapanta | Video Editor Portfolio</title>
    <!-- FontAwesome for clean social media and slider icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0c10;
            --accent-color: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #a4b3c6;
            --card-bg: #11141a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-bottom: 60px;
            overflow-x: hidden;
        }

        /* Top Navigation Menu */
        nav {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 30px 0;
            position: sticky;
            top: 0;
            background: rgba(11, 12, 16, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s;
            padding-bottom: 4px;
            border-bottom: 2px solid transparent;
        }

        nav a:hover, nav a.active {
            color: var(--text-main);
            border-bottom-color: var(--text-main);
        }

        /* Hero Header Structure */
        header {
            max-width: 1000px;
            margin: 40px auto 40px auto;
            text-align: center;
            padding: 0 24px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 35px;
            letter-spacing: -1px;
        }

        /* Subtitle layout with horizontal rule lines */
        .sub-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            max-width: 800px;
            margin: 0 auto 35px auto;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .sub-bar .line {
            flex-grow: 1;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.15);
        }

        .sub-item {
            font-weight: 500;
            white-space: nowrap;
        }

        /* Social Icons Grid Setup */
        .socials-row {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
        }

        .socials-row a {
            color: var(--text-muted);
            font-size: 1.2rem;
            transition: color 0.3s, transform 0.3s;
        }

        .socials-row a:hover {
            color: var(--accent-color);
            transform: translateY(-3px);
        }

        /* Section Architecture */
        .page-section {
            display: none;
        }

        .page-section.active-section {
            display: block;
        }

        .section-title {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 700;
            margin: 40px 0 30px 0;
            letter-spacing: -0.5px;
        }

        /* Responsive Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 30px;
        }

        /* ================= PREMIUM CAROUSEL LAYOUT (From your sketch) ================= */
        .carousel-wrapper {
            position: relative;
            max-width: 850px;
            margin: 0 auto 50px auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-container {
            width: 100%;
            overflow: hidden;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .carousel-track {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            width: 100%;
        }

        .carousel-slide {
            min-width: 100%;
            position: relative;
            padding-top: 56.25%; /* Clean 16:9 Aspect Ratio */
            background: #000;
        }

        .carousel-slide iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Slider Navigation Buttons styled matching back/forth sketch logic */
        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(17, 20, 26, 0.85);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .slider-btn:hover {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 15px var(--accent-glow);
            border-color: var(--accent-color);
        }

        .slider-btn.prev {
            left: -70px;
        }

        .slider-btn.next {
            right: -70px;
        }

        /* Portfolio Specific Toggle Buttons */
        .portfolio-tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
        }

        .tab-btn {
            background: transparent;
            border: 1px solid #23354d;
            color: var(--text-muted);
            padding: 10px 24px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active, .tab-btn:hover {
            border-color: var(--accent-color);
            color: var(--text-main);
            box-shadow: 0 0 15px var(--accent-glow);
            background: rgba(0, 210, 255, 0.05);
        }

        .portfolio-subgrid {
            display: none;
        }

        .portfolio-subgrid.active-subgrid {
            display: grid;
        }

        .longform-grid {
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 60px;
        }

        .shortform-grid {
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        /* Standard video element boxes for interior subgrids */
        .video-box {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .video-box:hover {
            transform: scale(1.02);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        .longform-box {
            padding-top: 56.25%;
        }

        .shortform-box {
            padding-top: 177.77%;
        }

        .video-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* CTA Section to mimic reference layout */
        .cta-section {
            max-width: 800px;
            margin: 60px auto 20px auto;
            text-align: center;
            padding: 40px 24px;
        }

        .cta-section p {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }

        .cta-section h2 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .cta-btn {
            display: inline-block;
            background-color: #ffffff;
            color: #000000;
            text-decoration: none;
            padding: 12px 32px;
            font-weight: 700;
            font-size: 0.9rem;
            border-radius: 4px;
            transition: transform 0.2s ease, opacity 0.2s ease;
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        /* Footer Layout elements */
        footer {
            margin-top: 60px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 60px 24px;
            text-align: center;
        }

        .footer-logo {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .footer-nav {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 25px;
        }

        .footer-nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .footer-nav a:hover {
            color: var(--text-main);
        }

        .copyright {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.3);
            margin-top: 30px;
        }

        /* Adjust positions for clean mobile layout scrolling */
        @media (max-width: 992px) {
            .slider-btn.prev { left: 15px; }
            .slider-btn.next { right: 15px; }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.8rem; }
            .sub-bar { flex-direction: column; gap: 8px; }
            .sub-bar .line { display: none; }
            .longform-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Main Navigation linking pages dynamically -->
    <nav>
        <a id="nav-home" class="active" onclick="switchPage('home')">Home</a>
        <a id="nav-about" href="mailto:aysel.zapanta@gmail.com">About</a>
        <a id="nav-portfolio" onclick="switchPage('portfolio')">Portfolio</a>
    </nav>

    <header>
        <h1>Yzhel Zapanta</h1>
        
        <div class="sub-bar">
            <div class="line"></div>
            <div class="sub-item">Video Editor</div>
            <div class="line"></div>

        <section class="cta-section">

            <h2>Have Some Questions?<br>Get In Touch</h2>

    <!-- ================= PORTFOLIO PAGE SECTION ================= -->
    <div id="page-portfolio" class="container page-section">

        <div id="subgrid-longform" class="portfolio-subgrid longform-grid active-subgrid">

        <div id="subgrid-shortform" class="portfolio-subgrid shortform-grid">

    <footer>
        <div class="footer-logo">Create</div>
        
        <div class="footer-nav">
            <a onclick="switchPage('home')">Home</a>
            <a href="mailto:aysel.zapanta@gmail.com">About</a>

        <div class="socials-row">
            <a href="https://www.instagram.com/itsayselzapanta/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/@yzhelzapanta" target="_blank"><i class="fab fa-youtube"></i></a>

        <div class="copyright">

        </div>
    </footer>

    <script>
        // Slider Navigation Engine
        let currentSlide = 0;
        const totalSlides = 4; // 4 sample curated videos

        function moveSlider(direction) {
            currentSlide += direction;
            
            // Boundary protections loops
            if (currentSlide < 0) {
                currentSlide = totalSlides - 1;
            } else if (currentSlide >= totalSlides) {
                currentSlide = 0;
            }
            
            const track = document.getElementById('sliderTrack');
            track.style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        // System to swap between global page layouts smoothly
        function switchPage(pageTarget) {
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('nav-portfolio').classList.remove('active');
            document.getElementById('page-home').classList.remove('active-section');
            document.getElementById('page-portfolio').classList.remove('active-section');

            if(pageTarget === 'home') {
                document.getElementById('nav-home').classList.add('active');
                document.getElementById('page-home').classList.add('active-section');
            } else if (pageTarget === 'portfolio') {
                document.getElementById('nav-portfolio').classList.add('active');
                document.getElementById('page-portfolio').classList.add('active-section');
            }
            window.scrollTo(0, 0);
        }

        // Subtab management inside the Portfolio view
        function switchPortfolioTab(type) {
            document.getElementById('tab-long').classList.remove('active');
            document.getElementById('tab-short').classList.remove('active');
            document.getElementById('subgrid-longform').classList.remove('active-subgrid');
            document.getElementById('subgrid-shortform').classList.remove('active-subgrid');

            if(type === 'longform') {
                document.getElementById('tab-long').classList.add('active');
                document.getElementById('subgrid-longform').classList.add('active-subgrid');
            } else if(type === 'shortform') {
                document.getElementById('tab-short').classList.add('active');
                document.getElementById('subgrid-shortform').classList.add('active-subgrid');
            }
        }
    </script>
</body>
</html>
